server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Issue RELATIVE redirects (e.g. /hex -> /hex/) so the directory redirect
    # keeps working behind a port mapping (nginx only sees :80, not the host port).
    absolute_redirect off;

    # gzip the text assets (HTML/CSS/JS/SVG)
    gzip            on;
    gzip_types      text/css application/javascript image/svg+xml application/manifest+json;
    gzip_min_length 256;

    # Security headers — mirrors netlify.toml.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

    # Hashed assets are immutable → cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro emits page.html files; resolve clean URLs (/hex -> /hex.html or /hex/).
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
