<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 2x2 checkerboard: white TL+BR, black TR+BL -->
  <defs>
    <clipPath id="round"><rect width="32" height="32" rx="5" /></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="16" height="16" fill="#f4f6f1" />
    <rect x="16" y="0" width="16" height="16" fill="#16191b" />
    <rect x="0" y="16" width="16" height="16" fill="#16191b" />
    <rect x="16" y="16" width="16" height="16" fill="#f4f6f1" />
  </g>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5" fill="none" stroke="#0a0d0b" stroke-opacity="0.3" />
</svg>
