services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: radiant-radiation
    container_name: radiant-radiation
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
